  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #060A16; color: #f8fafc;
      font-family: 'Inter', sans-serif;
      min-height: 100dvh; overflow-x: hidden;
    }

      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.07);
    }
    .glass-modal {
      background: rgba(10,15,30,0.96);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 60px rgba(99,102,241,0.2);
    }

    /* Scanner viewfinder */
    #scanner-wrap { position: relative; width:100%; max-width:380px; margin:0 auto; }
    #scanner-video {
      width: 100%; aspect-ratio: 1/1; object-fit: cover;
      border-radius: 1.25rem; display: block;
      background: #0a0f1d;
    }
    #scanner-canvas { display: none; }

    /* Animated scan line */
    .scan-line {
      position: absolute; left: 5%; right: 5%; height: 2px;
      background: linear-gradient(90deg, transparent, #818cf8, #22d3ee, #818cf8, transparent);
      border-radius: 2px;
      animation: scanLine 2s ease-in-out infinite;
      box-shadow: 0 0 8px rgba(129,140,248,0.7);
    }
    @keyframes scanLine {
      0%   { top: 8%; opacity: 1; }
      50%  { top: 88%; opacity: 0.9; }
      100% { top: 8%; opacity: 1; }
    }

    /* Corner brackets */
    .corner { position: absolute; width: 28px; height: 28px; }
    .corner-tl { top: 8px; left: 8px; border-top: 3px solid #818cf8; border-left: 3px solid #818cf8; border-radius: 6px 0 0 0; }
    .corner-tr { top: 8px; right: 8px; border-top: 3px solid #818cf8; border-right: 3px solid #818cf8; border-radius: 0 6px 0 0; }
    .corner-bl { bottom: 8px; left: 8px; border-bottom: 3px solid #818cf8; border-left: 3px solid #818cf8; border-radius: 0 0 0 6px; }
    .corner-br { bottom: 8px; right: 8px; border-bottom: 3px solid #818cf8; border-right: 3px solid #818cf8; border-radius: 0 0 6px 0; }

    /* Pulse ring for detection */
    @keyframes pulseRing {
      0%   { box-shadow: 0 0 0 0 rgba(99,102,241,0.6); }
      70%  { box-shadow: 0 0 0 16px rgba(99,102,241,0); }
      100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
    }
    .qr-detected { animation: pulseRing 0.6s ease-out; }

    /* Modal overlay */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px); z-index: 200;
      display: none; align-items: center; justify-content: center; padding: 16px;
    }
    .overlay.open { display: flex; }

    /* Toast */
    #toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(15,23,42,0.97); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px; padding: 12px 20px; font-size: 14px;
      z-index: 9999; opacity: 0; transition: all 0.3s ease;
      pointer-events: none; white-space: nowrap;
    }

    /* App launcher buttons */
    .app-btn {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px; border-radius: 16px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer; transition: all 0.2s; user-select: none;
      min-width: 80px;
    }
    .app-btn:active { transform: scale(0.93); }
    .app-btn:hover { background: rgba(255,255,255,0.1); }

    .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  </style>
</head>

<script>
/* ─────────────────────────────────────────────────────────
   CONFIG  (keep in sync with index.html)
   ───────────────────────────────────────────────────────── */
const SUPABASE_URL      = 'https://zgnnxujzbjohaovsfuhj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpnbm54dWp6YmpvaGFvdnNmdWhqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MjA1NzUsImV4cCI6MjA5NTE5NjU3NX0.srCWZrPVScAmd02zAJCmuypsS2aRaZGHLiW7L-kbqks';
const BACKEND_URL       = ''; // ← fill after Render deploy, e.g. 'https://pocketpal-api.onrender.com'

const API_BASE = BACKEND_URL
  ? BACKEND_URL
  : (location.origin.includes('localhost') || location.origin.includes('127.0.0.1')
      ? 'http://localhost:8000'
      : location.origin);

/* ─────────────────────────────────────────────────────────
   STATE
   ───────────────────────────────────────────────────────── */
let sbClient   = null;
let authSession = null;
let videoStream = null;
let scanInterval = null;
let upiData     = {};          // { pa, pn, am, tn, rawQr }
let isScanning  = false;
let hasBarcodeDetector = false;
let barcodeDetector    = null;

/* ─────────────────────────────────────────────────────────
   UTILITIES
   ───────────────────────────────────────────────────────── */
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  const icons = { success: '✅', error: '❌', info: 'ℹ️' };
  el.textContent = `${icons[type] || ''} ${msg}`;
  el.style.opacity = 1;
  el.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(el._t);
  el._t = setTimeout(() => {
    el.style.opacity = 0;
    el.style.transform = 'translateX(-50%) translateY(20px)';
  }, 3500);
}

function setStatus(msg) {
  document.getElementById('scanner-status').textContent = msg;
  console.log('[ScanPay] Status:', msg);
}

/* ─────────────────────────────────────────────────────────
   SUPABASE INIT
   ───────────────────────────────────────────────────────── */
function initSupabase() {
  try {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    console.log('[ScanPay] Supabase client initialized');

    // 1) Try sessionStorage token shared from index.html (same-origin new tab)
    try {
      const shared = sessionStorage.getItem('pp_session');
      if (shared) {
        const parsed = JSON.parse(shared);
        if (parsed?.access_token) {
          authSession = parsed;
          console.log('[ScanPay] Auth token loaded from sessionStorage');
          return; // No need to fetch — token already set
        }
      }
    } catch (e) {
      console.warn('[ScanPay] Could not read sessionStorage session:', e);
    }

    // 2) Fallback: ask Supabase for a live session (works if cookie/localStorage exists)
    sbClient.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        authSession = session;
        console.log('[ScanPay] Live session found, user:', session.user.email);
      } else {
        console.warn('[ScanPay] No active session — expense saving will fail. Log in via the dashboard first.');
      }
    });
  } catch (e) {
    console.error('[ScanPay] Supabase init failed:', e);
  }
}

/* ─────────────────────────────────────────────────────────
   CAMERA & SCANNER
   ───────────────────────────────────────────────────────── */
async function startScanner() {
  console.log('[ScanPay] Requesting camera access…');
  setStatus('Requesting camera…');

  const errorBox  = document.getElementById('camera-error');
  const errorMsg  = document.getElementById('camera-error-msg');
  const overlay   = document.getElementById('scanner-overlay');
  const scanHint  = document.getElementById('scan-hint');
  const video     = document.getElementById('scanner-video');

  errorBox.classList.add('hidden');

  // Stop any existing stream
  stopScanner();

  try {
    const constraints = {
      video: {
        facingMode: { ideal: 'environment' }, // rear camera preferred
        width:  { ideal: 1280 },
        height: { ideal: 1280 }
      }
    };

    videoStream = await navigator.mediaDevices.getUserMedia(constraints);
    video.srcObject = videoStream;
    await video.play();

    console.log('[ScanPay] Camera started:', videoStream.getVideoTracks()[0]?.label);
    setStatus('Scanning…');
    overlay.style.display = 'block';
    scanHint.textContent = 'Point at a UPI QR code — auto-detects';
    isScanning = true;

    // Check BarcodeDetector support
    if ('BarcodeDetector' in window) {
      try {
        barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
        hasBarcodeDetector = true;
        console.log('[ScanPay] Using BarcodeDetector API');
      } catch {
        hasBarcodeDetector = false;
      }
    } else {
      hasBarcodeDetector = false;
      console.log('[ScanPay] BarcodeDetector not available, falling back to jsQR');
    }

    // Start scan loop
    startScanLoop();

  } catch (err) {
    console.error('[ScanPay] Camera error:', err.name, err.message);
    overlay.style.display = 'none';
    errorBox.classList.remove('hidden');

    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      errorMsg.textContent = 'Camera permission denied.';
      toast('Please allow camera access in your browser settings.', 'error');
    } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
      errorMsg.textContent = 'No camera found on this device.';
      toast('No camera detected. Use the upload option below.', 'error');
    } else if (err.name === 'NotReadableError') {
      errorMsg.textContent = 'Camera is in use by another app.';
      toast('Camera busy. Close other apps using the camera.', 'error');
    } else if (err.name === 'OverconstrainedError') {
      // Retry without facingMode constraint
      console.warn('[ScanPay] Overconstrained — retrying without facingMode');
      try {
        videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = videoStream;
        await video.play();
        setStatus('Scanning…');
        isScanning = true;
        startScanLoop();
        return;
      } catch (e2) {
        errorMsg.textContent = 'Camera could not start.';
      }
    } else {
      errorMsg.textContent = `Camera error: ${err.message}`;
      toast('Camera error: ' + err.message, 'error');
    }

    setStatus('Camera error');
    scanHint.textContent = 'Upload a QR image using the option below.';
  }
}

function stopScanner() {
  isScanning = false;
  clearInterval(scanInterval);
  scanInterval = null;
  if (videoStream) {
    videoStream.getTracks().forEach(t => t.stop());
    videoStream = null;
    console.log('[ScanPay] Camera stream stopped');
  }
}

function startScanLoop() {
  // 10fps scan loop is enough for QR detection
  scanInterval = setInterval(async () => {
    if (!isScanning) return;
    const video = document.getElementById('scanner-video');
    if (!video || video.readyState < 2) return;  // not ready yet

    if (hasBarcodeDetector) {
      await scanWithBarcodeDetector(video);
    } else {
      scanWithJsQR(video);
    }
  }, 100);
}

async function scanWithBarcodeDetector(video) {
  try {
    const codes = await barcodeDetector.detect(video);
    if (codes.length > 0) {
      const raw = codes[0].rawValue;
      console.log('[ScanPay] BarcodeDetector detected QR:', raw);
      handleQRResult(raw);
    }
  } catch (e) {
    console.error('[ScanPay] BarcodeDetector scan error:', e);
  }
}

function scanWithJsQR(video) {
  const canvas = document.getElementById('scanner-canvas');
  const ctx    = canvas.getContext('2d');
  const w      = video.videoWidth;
  const h      = video.videoHeight;

  if (!w || !h) return;

  canvas.width  = w;
  canvas.height = h;
  ctx.drawImage(video, 0, 0, w, h);

  const imageData = ctx.getImageData(0, 0, w, h);
  const code = jsQR(imageData.data, w, h, { inversionAttempts: 'dontInvert' });
  if (code) {
    console.log('[ScanPay] jsQR detected QR:', code.data);
    handleQRResult(code.data);
  }
}

/* ─────────────────────────────────────────────────────────
   UPI QR PARSING
   ───────────────────────────────────────────────────────── */
function parseUPI(rawQr) {
  console.log('[ScanPay] Parsing UPI QR:', rawQr);

  // UPI format: upi://pay?pa=merchant@upi&pn=Name&am=100&tn=note
  if (!rawQr) return null;

  let url;
  try {
    // Normalize: some QR codes are plain upi:// URLs
    const normalized = rawQr.startsWith('upi://') ? rawQr : `upi://${rawQr}`;
    url = new URL(normalized);
  } catch {
    // Try treating it as a query string fragment
    try {
      url = new URL('upi://pay?' + rawQr);
    } catch {
      console.warn('[ScanPay] Not a valid UPI QR code:', rawQr);
      return null;
    }
  }

  const params = url.searchParams;
  const pa = (params.get('pa') || '').trim();
  const pn = (params.get('pn') || params.get('mc') || 'Unknown Merchant').trim();
  const am = params.get('am') || '';
  const tn = params.get('tn') || params.get('tr') || '';

  if (!pa) {
    console.warn('[ScanPay] UPI QR has no `pa` field — might not be a UPI QR');
    return null;
  }

  const result = { pa, pn, am, tn, rawQr };
  console.log('[ScanPay] Parsed UPI data:', result);
  return result;
}

function handleQRResult(raw) {
  // Stop scanning loop while processing
  stopScanner();
  setStatus('QR detected!');

  // Pulse animation
  const video = document.getElementById('scanner-video');
  video.classList.add('qr-detected');
  setTimeout(() => video.classList.remove('qr-detected'), 700);

  const parsed = parseUPI(raw);

  if (!parsed) {
    // Not a UPI QR — show error and resume
    toast('Not a valid UPI QR code. Try again.', 'error');
    console.error('[ScanPay] QR parsed but not UPI:', raw);
    setTimeout(() => startScanner(), 2000);
    return;
  }

  upiData = parsed;

  // Auto-fill amount if QR has amount
  const amountInput = document.getElementById('pay-amount');
  if (parsed.am) amountInput.value = parsed.am;

  // Auto-categorize via backend
  autoCategorize(parsed.pn);

  // Show payment modal
  document.getElementById('pay-merchant').textContent = parsed.pn || 'Unknown Merchant';
  document.getElementById('pay-upi-id').textContent   = parsed.pa;
  document.getElementById('pay-modal').classList.add('open');

  toast('QR scanned! Enter amount to pay.', 'success');
  console.log('[ScanPay] Payment modal opened for:', parsed);
}

/* ─────────────────────────────────────────────────────────
   AUTO-CATEGORIZE
   ───────────────────────────────────────────────────────── */
async function autoCategorize(description) {
  if (!description) return;
  console.log('[ScanPay] Auto-categorizing:', description);
  try {
    const headers = { 'Content-Type': 'application/json' };
    if (authSession?.access_token) {
      headers['Authorization'] = `Bearer ${authSession.access_token}`;
    }
    const res = await fetch(`${API_BASE}/api/upi/categorize`, {
      method: 'POST',
      headers,
      body: JSON.stringify({ description })
    });
    console.log('[ScanPay] Categorize API response status:', res.status);
    if (res.ok) {
      const data = await res.json();
      console.log('[ScanPay] Categorize result:', data);
      if (data.category && data.category !== 'Others') {
        document.getElementById('pay-category').value = data.category;
      }
    }
  } catch (err) {
    console.error('[ScanPay] Auto-categorize API error:', err);
    // Non-fatal — user can pick category manually
  }
}

/* ─────────────────────────────────────────────────────────
   UPI APP LAUNCHER
   ───────────────────────────────────────────────────────── */
function buildUpiLink(app) {
  const pa  = upiData.pa  || '';
  const pn  = encodeURIComponent(upiData.pn  || 'Merchant');
  const amt = document.getElementById('pay-amount').value.trim();
  const tn  = encodeURIComponent(upiData.tn  || 'PocketPal Payment');

  const base = `upi://pay?pa=${pa}&pn=${pn}&am=${amt}&tn=${tn}&cu=INR`;

  const deepLinks = {
    gpay:    `tez://upi/pay?pa=${pa}&pn=${pn}&am=${amt}&tn=${tn}&cu=INR`,
    phonepe: `phonepe://pay?pa=${pa}&pn=${pn}&am=${amt}&tn=${tn}&cu=INR`,
    paytm:   `paytmmp://pay?pa=${pa}&pn=${pn}&am=${amt}&tn=${tn}&cu=INR`,
    upi:     base
  };

  return deepLinks[app] || base;
}

function launchApp(app) {
  const amt = parseFloat(document.getElementById('pay-amount').value);
  if (!amt || amt <= 0) {
    toast('Please enter a valid amount first.', 'error');
    return;
  }
  if (!upiData.pa) {
    toast('No UPI ID found. Scan a QR first.', 'error');
    return;
  }

  const link = buildUpiLink(app);
  console.log('[ScanPay] Launching UPI app:', app, '→', link);

  // Open deep link — browser will open installed app or show fallback
  const a = document.createElement('a');
  a.href = link;
  a.click();

  // Fallback: if no app opens within 2s, show message
  const fallbackTimer = setTimeout(() => {
    toast('UPI app not found. Install Google Pay, PhonePe, or Paytm.', 'error');
    console.warn('[ScanPay] UPI deep link may not have opened — no app installed?');
  }, 2000);

  // If page goes hidden, app opened — clear fallback
  document.addEventListener('visibilitychange', function handler() {
    if (document.hidden) {
      clearTimeout(fallbackTimer);
      document.removeEventListener('visibilitychange', handler);
    }
  });
}

/* ─────────────────────────────────────────────────────────
   SAVE & TRACK
   ───────────────────────────────────────────────────────── */
async function saveAndTrack() {
  const amount    = parseFloat(document.getElementById('pay-amount').value);
  const category  = document.getElementById('pay-category').value;
  const merchant  = upiData.pn || 'UPI Payment';
  const upiId     = upiData.pa || '';
  const today     = new Date().toISOString().slice(0, 10);

  if (!amount || amount <= 0) {
    toast('Please enter a valid amount.', 'error');
    return;
  }

  if (!authSession?.access_token) {
    toast('Not signed in — please log in first.', 'error');
    console.error('[ScanPay] No auth session available for saving expense');
    return;
  }

  const payload = {
    amount,
    description: `UPI: ${merchant} (${upiId})`,
    category,
    date: today
  };

  console.log('[ScanPay] Saving expense via API:', JSON.stringify(payload));

  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined text-base animate-spin">refresh</span> Saving…';

  try {
    const res = await fetch(`${API_BASE}/api/upi/save-expense`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authSession.access_token}`
      },
      body: JSON.stringify(payload)
    });

    console.log('[ScanPay] Save API response status:', res.status);

    if (!res.ok) {
      const errText = await res.text();
      console.error('[ScanPay] Save API error body:', errText);
      throw new Error(errText || 'Server error');
    }

    const saved = await res.json();
    console.log('[ScanPay] Expense saved successfully:', saved);

    toast('Expense saved! Dashboard updated. 🎉', 'success');
    document.getElementById('pay-modal').classList.remove('open');

    // Reset for next scan
    upiData = {};
    document.getElementById('pay-amount').value = '';

    // Restart scanner
    setTimeout(() => startScanner(), 800);

  } catch (err) {
    console.error('[ScanPay] Failed to save expense:', err);
    toast('Failed to save: ' + (err.message || 'Unknown error'), 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined text-base">save</span> Save &amp; Track Expense';
  }
}

/* ─────────────────────────────────────────────────────────
   IMAGE UPLOAD FALLBACK
   ───────────────────────────────────────────────────────── */
function handleUpload(event) {
  const file = event.target.files?.[0];
  if (!file) return;

  console.log('[ScanPay] Processing uploaded image:', file.name);
  toast('Processing uploaded image…', 'info');

  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.getElementById('scanner-canvas');
      canvas.width  = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const imageData = ctx.getImageData(0, 0, img.width, img.height);
      const code = typeof jsQR !== 'undefined'
        ? jsQR(imageData.data, img.width, img.height)
        : null;

      if (code) {
        console.log('[ScanPay] jsQR decoded uploaded image:', code.data);
        handleQRResult(code.data);
      } else {
        console.warn('[ScanPay] No QR code found in uploaded image');
        toast('No QR code found in that image. Try a clearer photo.', 'error');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);

  // Reset file input so the same file can be selected again
  event.target.value = '';
}

/* ─────────────────────────────────────────────────────────
   MODAL
   ───────────────────────────────────────────────────────── */
function closePayModal(e) {
  if (e && e.target !== document.getElementById('pay-modal')) return;
  document.getElementById('pay-modal').classList.remove('open');
  // Resume scanning
  startScanner();
}

/* ─────────────────────────────────────────────────────────
   BACK BUTTON – stop camera on leave
   ───────────────────────────────────────────────────────── */
document.getElementById('back-btn').addEventListener('click', () => {
  stopScanner();
  console.log('[ScanPay] Navigating back — camera stopped');
});

window.addEventListener('pagehide', stopScanner);

/* ─────────────────────────────────────────────────────────
   INIT
   ───────────────────────────────────────────────────────── */
initSupabase();
startScanner();
</script>
